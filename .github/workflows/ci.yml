name: CI

on:
  push:
    branches:
      - 'master'
    paths-ignore:
      - '.github/workflows/periodic-*'
      - 'help/**'
      - 'README.md'

jobs:
  linux:
    name: Linux
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: true
      matrix:
        compiler:
          - clang-18
          - gcc-14

    env:
      ATHEME_CONF_ARGS: '--enable-contrib'
      CC: ${{ matrix.compiler }}

    steps:
    - name: Clone Atheme source code repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false
        ref: master
        repository: 'atheme/atheme'
        submodules: recursive

    - name: Update Atheme contrib submodule
      run: |
        cd modules/contrib/
        git checkout master
        git pull
        cd ../../

    - name: Install dependencies
      working-directory: /tmp
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends                 \
          ${CC}                                                         \
          lld-18                                                        \
          build-essential                                               \
          gettext                                                       \
          git                                                           \
          libargon2-dev                                                 \
          libcrack2-dev                                                 \
          libgcrypt20-dev                                               \
          libgettextpo-dev                                              \
          libidn11-dev                                                  \
          libldap2-dev                                                  \
          libpasswdqc-dev                                               \
          libpcre2-dev                                                  \
          libperl-dev                                                   \
          libqrencode-dev                                               \
          libsodium-dev                                                 \
          libssl-dev                                                    \
          # EOF

    - name: Run CI build script
      run: scripts/ci-build.sh
